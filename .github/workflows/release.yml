name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore project
        run: dotnet restore FinancialControlApp/FinancialControlApp.csproj

      - name: Publish Linux x64 build
        run: dotnet publish FinancialControlApp/FinancialControlApp.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o publish/linux-x64

      - name: Publish Windows x64 build
        run: dotnet publish FinancialControlApp/FinancialControlApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/win-x64

      - name: Publish macOS arm64 build
        run: dotnet publish FinancialControlApp/FinancialControlApp.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o publish/osx-arm64

      - name: Create release archives
        run: |
          mkdir -p artifacts
          cd publish
          zip -r ../artifacts/FinancialControlApp-linux-x64.zip linux-x64
          zip -r ../artifacts/FinancialControlApp-win-x64.zip win-x64
          zip -r ../artifacts/FinancialControlApp-osx-arm64.zip osx-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/FinancialControlApp-linux-x64.zip
            artifacts/FinancialControlApp-win-x64.zip
            artifacts/FinancialControlApp-osx-arm64.zip
